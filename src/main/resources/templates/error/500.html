<!doctype html>
<html lang="es">
    <head th:replace="~{fragmento/base :: head('Error del servidor', null)}">
        <meta charset="UTF-8"/>
        <title>Error del servidor</title>
    </head>
    <body>
    <header th:replace="~{fragmento/base::header}"></header>
    <main>
        <div class="error-container">
            <span class="material-symbols-outlined error-icono">error</span>
            <h1>500</h1>
            <p>Algo salió mal en el servidor</p>
            <p class="error-detalle" th:text="${mensaje}"></p>
            <a th:href="@{/}" class="btn-primario">Volver al inicio</a>
        </div>
    </main>
    <footer th:replace="~{fragmento/base::footer}"></footer>
    </body>
</html>
