<!doctype html>
<html lang="es">
<head th:replace="~{fragmento/base :: head('Crear Cita', '/css/cita/crearCita.css')}">
    <meta charset="UTF-8"/>
    <title>Crear Cita</title>
</head>
<body>
<header th:replace="~{fragmento/base::header}"></header>
<div th:replace="~{fragmento/base::mensaje}"></div>

<main>
    <form th:action="@{/citas}" method="post" th:object="${cita}">
        <h1>Crear Cita</h1>

        <p th:if="${error}" th:text="${error}" class="error-general"></p>

        <div class="ss-wrap" id="pacienteWrap">
            <span class="ss-label">Paciente</span>
            <div id="pacienteData" style="display:none">
                <div th:each="p : ${pacientes.content}"
                     th:data-id="${p.id}"
                     th:data-nombre="${p.nombre + ' ' + p.apellido}">
                </div>
            </div>
            <div class="ss-input-row" id="pacienteInputRow">
                <input class="ss-bare-input" id="pacienteInput" autocomplete="off" type="text"/>
            </div>
            <div class="ss-dropdown" id="pacienteDropdown"></div>
            <div id="pacienteHiddenFields"></div>
            <span th:errors="*{pacienteId}" class="error-msg"></span>
        </div>

        <div class="ss-wrap" id="doctorWrap">
            <span class="ss-label">Doctor</span>
            <div id="doctorData" style="display:none">
                <div th:each="d : ${doctores.content}"
                     th:data-id="${d.id}"
                     th:data-nombre="${d.nombre + ' ' + d.apellido}">
                </div>
            </div>
            <div class="ss-input-row" id="doctorInputRow">
                <input class="ss-bare-input" id="doctorInput" autocomplete="off" type="text"/>
            </div>
            <div class="ss-dropdown" id="doctorDropdown"></div>
            <div id="doctorHiddenFields"></div>
            <span th:errors="*{doctorId}" class="error-msg"></span>
        </div>

        <div class="ss-wrap" id="tipoConsultaWrap">
            <span class="ss-label">Tipo de Consulta</span>
            <div id="tipoConsultaData" style="display:none">
                <div th:each="tipo : ${tiposConsulta}"
                     th:data-id="${tipo}"
                     th:data-nombre="${tipo}">
                </div>
            </div>
            <div class="ss-input-row" id="tipoConsultaInputRow">
                <input class="ss-bare-input" id="tipoConsultaInput" autocomplete="off" type="text"/>
            </div>
            <div class="ss-dropdown" id="tipoConsultaDropdown"></div>
            <div id="tipoConsultaHiddenFields"></div>
            <span th:errors="*{consulta}" class="error-msg"></span>
        </div>

        <div class="input-container">
            <input type="text" id="motivo" th:field="*{motivo}" placeholder="Motivo"/>
            <label for="motivo" class="input-label">Motivo</label>
            <span th:errors="*{motivo}" class="error-msg"></span>
        </div>

        <div class="input-container">
            <input type="datetime-local" id="fechaHora" th:field="*{fechaHora}" placeholder="Fecha y Hora"/>
            <label for="fechaHora" class="input-label">Fecha y Hora</label>
            <span th:errors="*{fechaHora}" class="error-msg"></span>
        </div>

        <div class="buttons-container">
            <button type="submit">Crear Cita</button>
        </div>
    </form>
</main>

<footer th:replace="~{fragmento/base::footer}"></footer>
<script th:src="@{/js/utils/dropdown.js}"></script>
<script th:src="@{/js/cita/crearCita.js}"></script>
</body>
</html>
