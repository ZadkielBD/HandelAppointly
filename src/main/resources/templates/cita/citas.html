<!doctype html>
<html lang="es">
<head th:replace="~{fragmento/base :: head('Citas', '/css/cita/citas.css')}">
  <meta charset="UTF-8"/>
  <title>Citas</title>
</head>
<body>
<header th:replace="~{fragmento/base::header}"></header>
<div th:replace="~{fragmento/base::mensaje}"></div>

<main>
  <div class="panel-contenedor">
    
    <div class="panel-encabezado">
      <h1>Citas</h1>
      <a th:href="@{/citas/crear}" class="btn-accion primario">
        <span class="material-symbols-outlined">add</span> Nueva Cita
      </a>
    </div>

    <div class="tabla-wrapper">
      <table class="tabla-datos">
        <thead>
        <tr>
          <th>Código</th>
          <th>Paciente</th>
          <th>Doctor</th>
          <th>Fecha y Hora</th>
          <th>Estatus</th>
          <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cita : ${citas.content}">
          <td th:text="${cita.codigoCita}"></td>
          <td th:text="${cita.paciente}"></td>
          <td th:text="${cita.doctorNombre}"></td>
          <td th:text="${#temporals.format(cita.fechaHora, 'dd/MM/yyyy HH:mm')}"></td>
          <td>
            <span class="badge-estatus" th:text="${cita.estatus}"></span>
          </td>
          <td>
            <div class="acciones-fila">
              <a th:href="@{/citas/{id}(id=${cita.id})}" class="btn-icono info" title="Ver">
                <span class="material-symbols-outlined">visibility</span>
              </a>
              <a th:href="@{/citas/actualizar/{id}(id=${cita.id})}" class="btn-icono warning" title="Editar">
                <span class="material-symbols-outlined">edit</span>
              </a>
              <form th:action="@{/citas/eliminar/{id}(id=${cita.id})}" method="post" class="form-icono">
                <button type="submit" class="btn-icono danger" title="Eliminar">
                  <span class="material-symbols-outlined">delete</span>
                </button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <div class="paginacion">
      <a th:if="${citas.hasPrevious()}"
         th:href="@{/citas(page=${citas.number - 1})}" class="btn-accion">Anterior</a>
      <span th:text="|Página ${citas.number + 1} de ${citas.totalPages}|" class="info-pagina"></span>
      <a th:if="${citas.hasNext()}"
         th:href="@{/citas(page=${citas.number + 1})}" class="btn-accion">Siguiente</a>
    </div>

  </div>
</main>

<footer th:replace="~{fragmento/base::footer}"></footer>
</body>
</html>
