<!doctype html>
<html lang="es">
<head th:replace="~{fragmento/base :: head('Citas', null)}">
  <meta charset="UTF-8"/>
  <title>Citas</title>
</head>
<body>
<header th:replace="~{fragmento/base::header}"></header>
<div th:replace="~{fragmento/base::mensaje}"></div>

<main>
  <h1>Citas</h1>

  <a th:href="@{/citas/crear}" class="btn-crear">Nueva Cita</a>

  <table>
    <thead>
    <tr>
      <th>Código</th>
      <th>Paciente</th>
      <th>Doctor</th>
      <th>Fecha y Hora</th>
      <th>Estatus</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cita : ${citas.content}">
      <td th:text="${cita.codigoCita}"></td>
      <td th:text="${cita.paciente}"></td>
      <td th:text="${cita.doctorNombre}"></td>
      <td th:text="${cita.fechaHora}"></td>
      <td th:text="${cita.estatus}"></td>
      <td>
        <a th:href="@{/citas/{id}(id=${cita.id})}">Ver</a>
        <a th:href="@{/citas/actualizar/{id}(id=${cita.id})}">Editar</a>
        <form th:action="@{/citas/eliminar/{id}(id=${cita.id})}" method="post">
          <button type="submit">Eliminar</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

  <div class="paginacion">
    <a th:if="${citas.hasPrevious()}"
       th:href="@{/citas(page=${citas.number - 1})}">Anterior</a>
    <span th:text="|Página ${citas.number + 1} de ${citas.totalPages}|"></span>
    <a th:if="${citas.hasNext()}"
       th:href="@{/citas(page=${citas.number + 1})}">Siguiente</a>
  </div>
</main>

<footer th:replace="~{fragmento/base::footer}"></footer>
</body>
</html>
