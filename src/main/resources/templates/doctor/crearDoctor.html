<!doctype html>
<html lang="en">
    <head th:replace="~{fragmento/base :: head('Crear Cuenta', '/css/paciente/crearPaciente.css')}">
        <meta charset="UTF-8" />
        <title>Crear Cuenta</title>
    </head>

    <body>
        <header th:replace="~{fragmento/base::header}"></header>

        <main>
            <form th:action="@{/doctores}" method="post" th:object="${doctor}">
                <h1>Crear Cuenta</h1>
                <div class="input-container">
                    <input type="text" id="nombre" th:field="*{nombre}" placeholder="Ingresa tu nombre" />
                    <label for="nombre" class="input-label">Nombre</label>
                </div>

                <div class="input-container">
                    <input type="text" id="apellido" th:field="*{apellido}" placeholder="Ingresa tu apellido" />
                    <label for="apellido" class="input-label">Apellido</label>
                </div>

                <div class="input-container">
                    <input type="text" id="email" th:field="*{email}" placeholder="Ingresa tu email" />
                    <label for="email" class="input-label">Email</label>
                </div>

                <div class="input-container">
                    <input
                        type="text"
                        id="telefono"
                        th:field="*{numeroTelefono}"
                        placeholder="Ingresa tu numero de telefono"
                    />
                    <label for="telefono" class="input-label">Número de Teléfono</label>
                </div>

                <select id="especialidades" th:field="*{especialidadesIds}" class="select-multiple" multiple>
                    <option th:each="esp : ${especialidades}" th:value="${esp.id}" th:text="${esp.nombre}"></option>
                </select>

                <div class="input-container">
                    <input
                        type="text"
                        id="precioLocal"
                        th:field="*{precioLocal}"
                        placeholder="Ingresa el precio de consulta"
                    />
                    <label for="precioLocal" class="input-label">Precio</label>
                </div>

                <div class="input-container">
                    <input
                        type="text"
                        id="codigoDivisa"
                        th:field="*{codigoDivisa}"
                        placeholder="Ingresa el código de la divisa"
                    />
                    <label for="codigoDivisa" class="input-label">Código de Divisa</label>
                </div>

                <div class="input-container">
                    <input
                        type="password"
                        id="contrasena"
                        th:field="*{contrasena}"
                        placeholder="Ingresa tu contraseña"
                    />
                    <label for="contrasena" class="input-label">Contraseña</label>
                </div>

                <div class="buttons-container">
                    <button type="submit">Crear cuenta</button>
                </div>
            </form>
        </main>

        <footer th:replace="~{fragmento/base::footer}"></footer>
    </body>
</html>
