<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$CONTENT_TITLE - Handel Appointly">Handel Appointly</title>
    <link rel="icon" href="/static/img/IconoHA.ico" />
    <style>
        body {
            font-family: 'Monsterrat', sans-serif;
            margin: 0;

            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 15px 45px;
            
            background-color: #003366;

            display: flex;
            align-items: center;
            justify-content: space-between;

            width: 100%;
            height: 15vh;
            box-sizing: border-box;
        }

        main {
            flex: 1;
            padding: 20px;
        }

        footer {
            padding: 50px 40px;
            background-color: #003366;
            color: white;

            display: flex;
            align-items: center;
            justify-content: center;

            width: 100%;
            box-sizing: border-box;
        }
        
        .footer-columna {
            text-decoration: none;
            margin: 0 20px;
        }

        .footer-icono-nombre {
            display: flex;
            align-items: center;
            margin: 0 20px;
        }

        .footer-icono-nombre img{
            align-items: center;
            margin: 0;
            padding: 0;
        }

        .footer-info {
            display: inline-block;
            align-items: center;
            margin: 0 20px;
        }

        .header-logo {
            display: flex;
            align-items: center;
        }

        .nombre-app a {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 1.1rem;
        }

        .nav-menu a:hover {
            opacity: 0.8;
        }

        .registro-inicio {
            background-color: #E0F2FE;
            color: #003366 !important;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
        }

        .footer-columna h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #fff;
        }

        .footer-columna ul {
            list-style: none;
            padding: 0;
        }

        .footer-columna ul li {
            margin-bottom: 10px;
        }

        .footer-columna a {
            color: #ccc;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .footer-columna a:hover {
            color: white;
        }

        .icono {
            width: 100px;
            height: 90px;
            margin-right: 15px;
        }
    </style>
</head>

<body>

<header th:replace="fragments/header :: header">
    <div class="header-logo">
        <a href="../index.html">
            <img class="icono" src="../../static/img/IconoHA.ico" alt="icono">
        </a> 
        <span class="nombre-app">
            <a href="../index.html">Handel Appointly</a>
        </span>
    </div>
    <nav class="nav-menu" th:replace="~{fragments/navbar :: nav}">
        <a href="../index.html">Home</a>
        <a href="">Nosotros</a>
        <a href="" class="registro-inicio">Iniciar sesión</a>
        <a href="" class="registro-inicio">Registrarse</a>
    </nav>
</header>

<main layout:fragment="content">
    
</main>

<footer th:replace="fragments/footer :: footer">
    
    <div class="footer-columna">
        <div class="footer-icono-nombre">
            <h3>Handel Appointly</h3>
            <img class="icono" src="../../static/img/IconoHA.ico" alt="icono" >
        </div>
    </div>
    
    <div class="footer-columna">
            <h3>Servicio</h3>
            <ul>
                <li><a href="#">Privacidad y cookies</a></li>
                <li><a href="#">Quienes somos</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </div>

        <div class="footer-columna">
            <h3>Para los pacientes</h3>
            <ul>
                <li><a href="#">Especialistas</a></li>
                <li><a href="#">Clinicas</a></li>
            </ul>
        </div>
</footer>
</body>
</html>
